<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chic Déclic Photographie</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  background: #fff7f8;
  font-family: Arial, sans-serif;
}

.page {
  position: relative;
  max-width: 1365px;
  margin: 0 auto;
}

.page img {
  display: block;
  width: 100%;
  height: auto;
}

.lamapix-form {
  position: absolute;
  left: 23.5%;
  top: 62.9%;
  width: 55.6%;
  height: 5.1%;
  display: flex;
  z-index: 20;
}

.lamapix-form input[type="text"] {
  width: 65.5%;
  height: 100%;
  border: 1px solid #d6d6d6;
  background: #ffffff;
  color: #333333;
  outline: none;
  padding-left: 22px;
  font-size: clamp(12px, 1.35vw, 22px);
  box-sizing: border-box;
  border-radius: 6px 0 0 6px;
}

.lamapix-form input[type="text"]::placeholder {
  color: #777777;
}

.lamapix-form input[type="submit"] {
  width: 34.5%;
  height: 100%;
  border: none;
  background: transparent;
  color: transparent;
  cursor: pointer;
  padding: 0;
}

@media (max-width: 700px) {
  .lamapix-form input[type="text"] {
    padding-left: 8px;
    font-size: 12px;
  }
}
</style>
</head>
<body>
  <main class="page">
    <img src="page.png" alt="Chic Déclic Photographie - Galerie privée famille et enfants">

    <form class="lamapix-form" target="_top" method="post" action="https://www.lamapix.com/lamapix.com/index.php">
      <input type="text" name="code" placeholder="Votre code galerie" required>
      <input type="submit" value="Accéder à ma galerie">
    </form>
  </main>
</body>
</html>
