<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chic Déclic Photographie</title>
<style>
body {
  margin: 0;
  background: #fff7f8;
  font-family: Arial, sans-serif;
}

.page {
  position: relative;
  max-width: 1023px;
  margin: auto;
}

.page img {
  width: 100%;
  display: block;
}

/* Formulaire placé exactement sur le champ dessiné dans le visuel */
.lamapix-form {
  position: absolute;
  left: 18.0%;
  top: 48.25%;
  width: 64.2%;
  height: 3.45%;
  display: flex;
  z-index: 20;
}

.lamapix-form input[type="text"] {
  width: 66.2%;
  height: 100%;
  border: 1px solid #dddddd;
  background: #ffffff;
  outline: none;
  padding-left: 18px;
  font-size: 17px;
  color: #333333;
  border-radius: 4px 0 0 4px;
  box-sizing: border-box;
}

.lamapix-form input[type="text"]::placeholder {
  color: #777777;
}

.lamapix-form input[type="submit"] {
  width: 33.8%;
  height: 100%;
  border: none;
  background: transparent;
  color: transparent;
  cursor: pointer;
  padding: 0;
}

@media(max-width:700px) {
  .lamapix-form input[type="text"] {
    font-size: 12px;
    padding-left: 8px;
  }
}
</style>
</head>
<body>
<div class="page">
  <img src="page.png" alt="Chic Déclic Photographie">
  <form class="lamapix-form" target="_top" method="post" action="https://www.lamapix.com/lamapix.com/index.php">
    <input type="text" name="code" placeholder="Votre code galerie" required>
    <input type="submit" value="">
  </form>
</div>
</body>
</html>
