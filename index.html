<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chic Déclic Photographie</title>

<style>
body {
  margin: 0;
  background: #fff7f8;
  font-family: Arial, sans-serif;
}

.page {
  position: relative;
  max-width: 1365px;
  margin: auto;
}

.page img {
  width: 100%;
  display: block;
}

.lamapix-form {
  position: absolute;
  left: 25%;
  top: 57%;
  width: 52%;
  height: 5%;
  display: flex;
}

.lamapix-form input[type="text"] {
  width: 66%;
  border: 1px solid #ddd;
  padding-left: 15px;
  font-size: 16px;
}

.lamapix-form input[type="submit"] {
  width: 34%;
  border: none;
  background: transparent;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="page">
  <img src="page.png">

  <form class="lamapix-form" method="post" action="https://www.lamapix.com/lamapix.com/index.php">
    <input type="text" name="code" placeholder="Votre code galerie">
    <input type="submit">
  </form>
</div>

</body>
</html>
